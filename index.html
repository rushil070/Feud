<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Clash</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="welcomeModal">

    <div id="welcomeBox">

        <h2>Welcome to Coin Clash!</h2>

        <p>
            Compete with another player to collect 20 coins before they do.
            Player 1 uses WASD and Player 2 uses the Arrow Keys.
            The first player to collect 20 coins wins.
        </p>

        <button id="closeWelcomeBtn">Close</button>

    </div>

</div>

    <h1>Coin Clash</h1>

    <div id="scoreboard">
        <span id="player1Score"><b>Player 1:</b> 0</span>
        <span id="player2Score"><b>Player 2:</b> 0</span>
    </div>

    <div id="buttonRow">
        <button id="startBtn">Start Game</button>
        <button id="resetBtn">Reset Game</button>
        <button id="hardModeBtn">Hard Mode</button>
        <button id="fastModeBtn">Fast Mode</button>
        <button id="tenModeBtn">10 Mode</button>
    </div>

    <canvas id="gameCanvas" width="1100" height="600"></canvas>

    <script src="script.js"></script>

</body>
</html>
